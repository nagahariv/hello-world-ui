name: CI — Quality & Security Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * 1'   # Weekly scan every Monday 03:00 UTC
  workflow_dispatch:        # Manual trigger from Actions tab

# Cancel duplicate runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Shared environment
# ─────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 1 — ESLint + Prettier (Linting & Formatting)                      ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: 🟢  Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          

      - name: 📦  Install dependencies
        run: npm install

      # ── ESLint — logic, security anti-patterns ──────────────────────────
      - name: 🔍  ESLint
        run: npm run lint

      # ── Prettier — consistent formatting ────────────────────────────────
      - name: 🎨  Prettier format check
        run: npm run format:check


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 2 — Jest (Unit Tests + Coverage)                                  ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint   # only run tests if linting passes

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: 🟢  Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          

      - name: 📦  Install dependencies
        run: npm install

      # ── Jest with coverage report ────────────────────────────────────────
      - name: 🧪  Run Jest
        run: npm run test:coverage -- --coverageReporters=lcov --coverageReporters=text-summary

      # ── Upload coverage artifact (viewable in Actions run) ───────────────
      - name: 📊  Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # ── Codecov (free for public repos — add CODECOV_TOKEN for private) ──
      - name: 📈  Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 3 — npm audit (Dependency Vulnerability Scan)                     ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  npm-audit:
    name: 📦 npm Audit
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: 🟢  Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          

      - name: 📦  Install dependencies
        run: npm install

      # ── Audit at "moderate" severity during push/PR ──────────────────────
      # On the weekly schedule, audit at "low" for maximum coverage
      - name: 🔎  npm audit
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npm audit --audit-level=low
          else
            npm audit --audit-level=moderate
          fi


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 4 — Snyk (Dependency + SAST Code Security)                        ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  #
  #  Setup:
  #    1. Sign up free at https://app.snyk.io
  #    2. Go to Account Settings → API Token → copy it
  #    3. Add to GitHub: Settings → Secrets → SNYK_TOKEN
  #
  snyk:
    name: 🛡️ Snyk Security
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: 🟢  Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          

      - name: 📦  Install dependencies
        run: npm install

      # ── Snyk: dependency vulnerability scan ─────────────────────────────
      - name: 🔐  Snyk — dependency scan
        uses: snyk/actions/node@master
        continue-on-error: true          # flip to false to block on high severity
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-deps.sarif

      # ── Snyk: static application security testing (SAST) ────────────────
      - name: 🔐  Snyk — SAST code scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-code.sarif

      # ── On scheduled run: also run Snyk Monitor (live dashboard) ────────
      - name: 📡  Snyk Monitor (scheduled only)
        if: github.event_name == 'schedule'
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --project-name=${{ github.repository }}

      # ── Upload SARIF to GitHub Security → Code Scanning tab ─────────────
      - name: 📤  Upload Snyk dep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies

      - name: 📤  Upload Snyk code SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-code.sarif
          category: snyk-sast


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 5 — Semgrep (SAST — OWASP / XSS / JS rules)                      ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  #
  #  Free OSS mode: works without any token.
  #  Cloud dashboard: sign up at https://semgrep.dev, add SEMGREP_APP_TOKEN.
  #
  semgrep:
    name: 🔎 Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      # ── OSS rule packs — no account needed ───────────────────────────────
      - name: 🔎  Semgrep scan
        run: >
          semgrep scan
          --config=auto
          --config=p/javascript
          --config=p/owasp-top-ten
          --config=p/xss
          --config=p/secrets
          --sarif
          --output=semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── Upload to GitHub Security tab ────────────────────────────────────
      - name: 📤  Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 6 — CodeQL (GitHub Native SAST — 100% free)                       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  #
  #  Zero setup — works out of the box on any GitHub repo.
  #  Results appear under Security → Code Scanning.
  #
  codeql:
    name: 🔬 CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: 🔬  Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended, security-and-quality

      - name: 🏗️  Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔬  Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-javascript


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 7 — Dependency Review (PRs only — blocks on new CVEs)             ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  dependency-review:
    name: 🔐 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      # Diffs base..head and blocks PRs that add vulnerable packages
      - name: 🔐  Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC


  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  JOB 8 — Status Gate (required check for branch protection)            ║
  # ╚══════════════════════════════════════════════════════════════════════════╝
  #  Add "ci-gate" as a required status check in branch protection rules.
  #  This single check enforces that lint + test both passed.
  ci-gate:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    needs: [lint, test, npm-audit]
    if: always()

    steps:
      - name: ✅  Check all required jobs passed
        run: |
          echo "lint:      ${{ needs.lint.result }}"
          echo "test:      ${{ needs.test.result }}"
          echo "npm-audit: ${{ needs.npm-audit.result }}"
          if [[ "${{ needs.lint.result }}"      != "success" ||
                "${{ needs.test.result }}"      != "success" ||
                "${{ needs.npm-audit.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed."
            exit 1
          fi
          echo "✅ All required jobs passed."
